name: Publish Extension

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.5.0, v1.0.0
  workflow_dispatch:  # Allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package
        id: package

      - name: Get VSIX filename
        id: vsix
        run: echo "file=$(ls *.vsix)" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ steps.vsix.outputs.file }}

      # --- Publish to VS Code Marketplace ---
      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --packagePath ${{ steps.vsix.outputs.file }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # --- Publish to Open VSX (for Antigravity / VS Code forks) ---
      - name: Publish to Open VSX
        run: npx ovsx publish ${{ steps.vsix.outputs.file }} -p ${{ secrets.OVSX_TOKEN }}

      # --- Create GitHub Release ---
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.file }}
          generate_release_notes: true
