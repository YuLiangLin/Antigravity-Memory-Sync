name: Build & Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: antigravity-explorer
        run: npm ci

      - name: Compile TypeScript
        working-directory: antigravity-explorer
        run: npm run compile

      - name: Package VSIX
        working-directory: antigravity-explorer
        run: npx @vscode/vsce package --allow-missing-repository --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: antigravity-explorer-vsix
          path: antigravity-explorer/*.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: antigravity-explorer/*.vsix
          generate_release_notes: true
